<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Bài 1</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <h1>Bài 1</h1>

        <a href="index.html">Quay lại</a>

        <script>
            function classifyTriangle(a, b, c) {
                // Cạnh không hợp lệ
                if (a <= 0 || b <= 0 || c <= 0) {
                    return "Cạnh không hợp lệ";
                }

                // Bất đẳng thức tam giác
                if (a + b <= c || a + c <= b || b + c <= a) {
                    return "Không tạo thành tam giác";
                }

                // Tam giác đều
                if (a === b && b === c) {
                    return "Tam giác đều";
                }

                // Tam giác cân
                if (a === b || a === c || b === c) {
                    return "Tam giác cân";
                }

                // Tam giác vuông
                if (a * a + b * b === c * c || a * a + c * c === b * b || b * b + c * c === a * a) {
                    return "Tam giác vuông";
                }

                return "Tam giác thường";
            }

            // Tam giác vuông
            console.log(classifyTriangle(3, 4, 5));

            // Tam giác đều
            console.log(classifyTriangle(2, 2, 2));

            // Tam giác cân
            console.log(classifyTriangle(2, 2, 3));

            // Không tạo thành tam giác
            console.log(classifyTriangle(1, 2, 10));

            // Cạnh không hợp lệ
            console.log(classifyTriangle(-1, 2, 3));

            // Tam giác thường
            console.log(classifyTriangle(4, 5, 6));
        </script>
    </body>
</html>
