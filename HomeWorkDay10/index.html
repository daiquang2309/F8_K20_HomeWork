<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <title>List HomeWorkDay10</title>

        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: Arial, sans-serif;

                min-height: 100vh;

                display: flex;
                justify-content: center;
                align-items: center;

                background: linear-gradient(135deg, #0f172a, #111827, #1e293b);
            }

            /* Box */

            .container {
                width: 800px;

                padding: 35px;

                border-radius: 20px;

                background: rgba(255, 255, 255, 0.05);

                backdrop-filter: blur(12px);

                border: 1px solid rgba(255, 255, 255, 0.1);

                box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            }

            h1 {
                color: white;

                text-align: center;

                margin-bottom: 25px;

                letter-spacing: 2px;
            }

            /* List */

            .list {
                list-style: none;
            }

            .list li {
                margin: 15px 0;
            }

            /* Link */

            .list a {
                display: block;

                padding: 16px;

                border-radius: 12px;

                text-decoration: none;

                color: #ddd;

                background: rgba(255, 255, 255, 0.05);

                transition: 0.3s;
            }

            /* Hover */

            .list a:hover {
                transform: translateX(8px) scale(1.02);

                background: linear-gradient(90deg, #2563eb, #7c3aed);

                color: white;

                box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
            }
        </style>
    </head>

    <body>
        <div class="container">
            <h1>List HomeWork Day 10</h1>

            <ul class="list">
                <li>
                    <a href="bai1.html" target="_blank"> Bài 1 </a>
                </li>

                <li>
                    <a href="bai2.html" target="_blank"> Bài 2 </a>
                </li>
            </ul>
        </div>
    </body>
</html>
