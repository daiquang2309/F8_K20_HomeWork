<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <title>List HomeWork</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background: #f4f6f9;
                margin: 0;
            }

            .container {
                max-width: 800px;
                margin: 40px auto;
                background: white;
                padding: 20px;
                border-radius: 10px;
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            }

            h1 {
                text-align: center;
            }

            .list {
                list-style: none;
                padding: 0;
            }

            .list li {
                margin: 10px 0;
            }

            .list a {
                display: block;
                padding: 12px;
                background: #f1f1f1;
                border-radius: 8px;
                text-decoration: none;
                color: #333;
                transition: 0.2s;
            }

            .list a:hover {
                background: #007bff;
                color: white;
                transform: translateX(5px);
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>List HomeWork</h1>

            <ul class="list">
                <li><a href="./HomeWorkDay1/">HomeWork Day 1</a></li>
                <li><a href="javascript:void(0)">HomeWork Day 2</a></li>
                <li><a href="javascript:void(0)">HomeWork Day 3</a></li>
                <li><a href="javascript:void(0)">HomeWork Day 4</a></li>
                <li><a href="javascript:void(0)">HomeWork Day 5</a></li>
            </ul>
        </div>
    </body>
</html>
